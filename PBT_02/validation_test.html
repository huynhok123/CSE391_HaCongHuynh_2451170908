<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hà Công Huỳnh</title>
  </head>
  <body>
    <form>
      <div class="field">
        <label>1. Text</label>
        <input type="text" required value="" />
      </div>

      <div class="field">
        <label>2. Email</label>
        <input type="email" value="" />
      </div>

      <div class="field">
        <label>3. Numbe</label>
        <input type="number" min="1" max="10" value="" />
      </div>

      <div class="field">
        <label>4. Pattern</label>
        <input type="text" pattern="[0-9]{10}" value="" />
      </div>

      <div class="field">
        <label>5. Password</label>
        <input type="password" minlength="8" value="" />
      </div>

      <button type="submit">Submit</button>
    </form>
  </body>
</html>
