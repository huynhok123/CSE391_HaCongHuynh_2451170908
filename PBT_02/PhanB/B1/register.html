<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hà Công Huỳnh</title>
  </head>
  <body>
    <h2>Form đăng ký tài khoản</h2>

    <form action="#" method="POST">
      <fieldset>
        <legend>Thông tin cá nhân</legend>

        <label for="fullname">Họ và tên *</label>
        <input
          type="text"
          id="fullname"
          name="fullname"
          required
          minlength="2"
          maxlength="50"
          placeholder="Nguyễn Văn A"
        />

        <label for="email">Email *</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="email@example.com"
        />

        <label for="phone">Số điện thoại</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          pattern="[0-9]{10}"
          placeholder="Nhập 10 chữ số"
        />

        <label for="dob">Ngày sinh</label>
        <input
          type="date"
          id="dob"
          name="dob"
          max="2026-04-26"
          placeholder="Chọn ngày sinh"
        />
      </fieldset>

      <fieldset>
        <legend>Tài khoản</legend>

        <label for="username">Username *</label>
        <input
          type="text"
          id="username"
          name="username"
          required
          pattern="[A-Za-z0-9_]{3,20}"
          title="3-20 ký tự: chữ, số, underscore"
          placeholder="username_123"
        />

        <label for="password">Password *</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          minlength="8"
          pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
          title="Ít nhất 8 ký tự, có 1 chữ hoa và 1 số"
          placeholder="Mật khẩu mạnh"
        />

        <label for="confirm">Xác nhận password *</label>
        <input
          type="password"
          id="confirm"
          name="confirm"
          required
          minlength="8"
          pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
          placeholder="Nhập lại mật khẩu"
        />
      </fieldset>

      <fieldset>
        <legend>Thông tin giao hàng</legend>

        <label for="city">Thành phố *</label>
        <select id="city" name="city" required>
          <option value="">-- Chọn thành phố --</option>
          <option>Hà Nội</option>
          <option>TP. Hồ Chí Minh</option>
          <option>Đà Nẵng</option>
          <option>Hải Phòng</option>
          <option>Cần Thơ</option>
        </select>

        <label for="district">Quận/Huyện</label>
        <select id="district" name="district">
          <option>Quận 1</option>
          <option>Quận 2</option>
          <option>Quận 3</option>
          <option>Quận 4</option>
        </select>

        <label for="address">Địa chỉ chi tiết</label>
        <textarea
          id="address"
          name="address"
          rows="3"
          placeholder="Số nhà, đường, phường/xã..."
        ></textarea>

        <p>Giới tính:</p>
        <label>
          <input class="inline" type="radio" name="gender" value="male" />
          Nam
        </label>
        <label>
          <input class="inline" type="radio" name="gender" value="female" />
          Nữ
        </label>
        <label>
          <input class="inline" type="radio" name="gender" value="other" />
          Khác
        </label>
      </fieldset>

      <label>
        <input class="inline" type="checkbox" name="agree" required />
        Tôi đồng ý với điều khoản sử dụng
      </label>

      <button type="submit">Đăng ký</button>
      <button type="reset">Reset</button>
    </form>
  </body>
</html>
