<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hà Công Huỳnh</title>
    <link rel="stylesheet" href="grid.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h2>HEADER (full width)</h2>
      </header>

      <section class="hero">
        <h4>HERO BANNER</h4>
      </section>
      <section class="Featured">
        <h4>SẢN PHẨM NỔI BẬT</h4>
      </section>
      <aside class="sidebar">
        <h5>SIDEBAR (filter)</h5>
        <label><input type="checkbox" /> Điện thoại</label><br />
        <label><input type="checkbox" /> Laptop</label><br />
        <label><input type="checkbox" /> Tai nghe</label><br />
        <label><input type="checkbox" /> Phụ kiện</label>
      </aside>
      <main>
        <h5>MAIN CONTENT</h5>
        <div class="cards">
          <div class="card">card</div>
          <div class="card">card</div>
          <div class="card">card</div>
          <div class="card">card</div>
          <div class="card">card</div>
          <div class="card">card</div>
        </div>
      </main>
      <aside class="ads">
        <img src="" alt="placeholder image" />
      </aside>
      <footer>
        <h4>FOOTER (full width)</h4>
      </footer>
    </div>
  </body>
</html>
