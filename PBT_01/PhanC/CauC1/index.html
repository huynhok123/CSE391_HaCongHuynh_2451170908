<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hà Công Huỳnh</title>
  </head>
  <body>
    <header>
      <!-- header: đầu trang -->
      <nav>
        <!-- nav: menu -->
        <ul>
          <li><a href="#">Home</a></li>
        </ul>
      </nav>
    </header>

    <nav aria-label="breadcrumb">
      <!-- nav: điều hướng -->
      <ol>
        <!-- ol: có thứ tự -->
        <li><a href="#">Trang chủ</a></li>
        <li><a href="#">Điện thoại</a></li>
        <li>iPhone 16</li>
      </ol>
    </nav>

    <main>
      <!-- main: nội dung chính -->

      <section>
        <!-- section: nhóm product -->

        <article>
          <!-- article: ảnh -->
          <figure>
            <img src="#" />
            <figcaption>Ảnh</figcaption>
          </figure>
        </article>

        <article>
          <!-- article: info -->
          <h1>Tên SP</h1>
          <p>Giá</p>
          <p>Mô tả</p>
        </article>
      </section>

      <section>
        <!-- section: specs -->
        <table>
          <!-- table: thông số -->
          <tr>
            <th>Key</th>
            <th>Value</th>
          </tr>
          <tr>
            <td>CPU</td>
            <td>...</td>
          </tr>
        </table>
      </section>

      <section>
        <!-- section: review -->
        <article>
          <!-- article: 1 comment -->
          <h3>User</h3>
          <p>Comment</p>
        </article>
      </section>
    </main>

    <aside>
      <!-- aside: sidebar -->
      <ul>
        <li><a href="#">SP tương tự</a></li>
      </ul>
    </aside>

    <footer>
      <!-- footer: cuối trang -->
      <p>Footer</p>
    </footer>
  </body>
</html>
